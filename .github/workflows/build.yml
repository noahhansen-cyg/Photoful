name: Build Smoke Test

# Runs only on pushes to main (post-merge) and on-demand.
# Kept separate from unit tests because PyInstaller builds are slow (~3-5 min)
# and test things unit tests cannot: hidden import resolution, binary startup,
# and the /healthz liveness probe.
on:
  push:
    branches: [main, development]
  workflow_dispatch:

jobs:
  build:
    name: PyInstaller bundle + healthz probe
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      # PyInstaller's datas stanza includes ../frontend/dist, so build first.
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend dist
        run: test -f frontend/dist/index.html

      - name: Bundle backend with PyInstaller
        working-directory: backend
        run: pyinstaller photoful.spec --distpath dist --workpath build

      # Onedir bundle: the executable lives inside the photoful-server folder.
      - name: Verify binary exists
        run: test -f backend/dist/photoful-server/photoful-server

      # Start the server in the background and poll /healthz.
      # This catches hidden-import failures and missing runtime files that
      # only surface when the binary actually executes.
      - name: Start server and probe /healthz
        run: |
          chmod +x backend/dist/photoful-server/photoful-server
          backend/dist/photoful-server/photoful-server &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/healthz > /dev/null; then
              echo "Server is healthy after ${i}s"
              kill "$SERVER_PID" 2>/dev/null || true
              exit 0
            fi
            sleep 1
          done

          echo "ERROR: server did not respond to /healthz within 30s"
          kill "$SERVER_PID" 2>/dev/null || true
          exit 1
