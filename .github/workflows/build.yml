name: Binary E2E

# Builds the PyInstaller bundle and runs the end-to-end suite against the
# actual binary (backend/tests_e2e/): spawns the executable and plays a full
# multiplayer game over real HTTP + Socket.IO. This catches what unit tests
# cannot — hidden-import failures, missing bundled assets, transport issues —
# on all three platforms (PyInstaller output is platform-specific).
on:
  push:
    branches: [main, development]
  pull_request:
  workflow_dispatch:

jobs:
  binary-e2e:
    name: Binary E2E (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-dev.txt

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Python dependencies
        working-directory: backend
        run: pip install -r requirements-dev.txt pyinstaller

      # Headless browser for the TV-page E2E tests (tests_e2e/test_tv_browser.py)
      - name: Install Playwright chromium
        run: python -m playwright install --with-deps chromium

      - name: Install Node dependencies
        working-directory: frontend
        run: npm ci

      # PyInstaller's datas stanza includes ../frontend/dist, so build first.
      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Verify frontend dist
        shell: bash
        run: test -f frontend/dist/index.html

      - name: Bundle backend with PyInstaller
        working-directory: backend
        run: pyinstaller photoful.spec --distpath dist --workpath build

      - name: Run binary end-to-end tests
        working-directory: backend
        run: python -m pytest tests_e2e/ -v
